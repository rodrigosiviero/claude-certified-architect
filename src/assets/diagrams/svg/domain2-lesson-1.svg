<text x="109.625" y="118" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#fff">Tool Definition</text>
<text x="462.03999999999996" y="58" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;get_weather&quot;</text>
<text x="462.03999999999996" y="118" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;Get current weather for a city&quot;</text>
<text x="462.03999999999996" y="178" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;{city: string, unit: celsius|fahrenheit}&quot;</text>
<text x="762.84" y="118" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#fff">Claude reads + decides</text>
<text x="1027.8899999999999" y="118" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#fff">&quot;tool_use: get_weather(city=SF)&quot;</text>
</svg>