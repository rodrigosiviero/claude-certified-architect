<rect x="218.13" y="44.5" width="38.88" height="27" rx="4" ry="4" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="0.5" />
<text x="237.57" y="58" text-anchor="middle" dy="0.35em" font-size="11" font-weight="400" fill="var(--_text-muted)">name</text>
<rect x="198.10999999999999" y="104.5" width="78.92" height="27" rx="4" ry="4" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="0.5" />
<text x="237.57" y="118" text-anchor="middle" dy="0.35em" font-size="11" font-weight="400" fill="var(--_text-muted)">description</text>
<rect x="195.25" y="164.5" width="84.64" height="27" rx="4" ry="4" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="0.5" />
<text x="237.57" y="178" text-anchor="middle" dy="0.35em" font-size="11" font-weight="400" fill="var(--_text-muted)">input_schema</text>
<rect x="40" y="100" width="139.25" height="36" rx="0" ry="0" fill="#3b82f6" stroke="var(--_node-stroke)" stroke-width="0.75" />
<rect x="399.56499999999994" y="40" width="124.95" height="36" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
<rect x="331.64" y="100" width="260.8" height="36" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
<rect x="295.89" y="160" width="332.3" height="36" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
