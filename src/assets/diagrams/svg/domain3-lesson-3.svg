<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768.19 436" width="768.19" height="436" style="--bg:#1a1b26;--fg:#a9b1d6;--line:#3d59a1;--accent:#7aa2f7;--muted:#565f89;background:var(--bg)">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 30%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="arrowhead" markerWidth="8" markerHeight="4.8" refX="8" refY="2.4" orient="auto">
    <polygon points="0 0, 8 2.4, 0 4.8" fill="var(--_arrow)" />
  </marker>
  <marker id="arrowhead-start" markerWidth="8" markerHeight="4.8" refX="0" refY="2.4" orient="auto-start-reverse">
    <polygon points="8 0, 0 2.4, 8 4.8" fill="var(--_arrow)" />
  </marker>
</defs>
<rect x="40" y="40" width="379.45000000000005" height="356" rx="0" ry="0" fill="var(--_group-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
<rect x="40" y="40" width="379.45000000000005" height="28" rx="0" ry="0" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="1" />
<text x="52" y="54" dy="0.35em" font-size="12" font-weight="600" fill="var(--_text-sec)">&quot;Context Budget (200K tokens)&quot;</text>
<polyline points="399.45000000000005,296 567.49,296" fill="none" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#arrowhead)" />
<rect x="455.45000000000005" y="282.5" width="56.04" height="27" rx="4" ry="4" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="0.5" />
<text x="483.47" y="296" text-anchor="middle" dy="0.35em" font-size="11" font-weight="400" fill="var(--_text-muted)">Turn 50</text>
<rect x="567.49" y="278" width="160.70000000000002" height="36" rx="0" ry="0" fill="#ef4444" stroke="var(--_node-stroke)" stroke-width="0.75" />
<rect x="127.92500000000001" y="98" width="203.60000000000002" height="36" rx="0" ry="0" fill="#3b82f6" stroke="var(--_node-stroke)" stroke-width="0.75" />
<rect x="138.65000000000003" y="158" width="182.15" height="36" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
<rect x="127.92500000000001" y="218" width="203.60000000000002" height="36" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
<rect x="60" y="278" width="339.45000000000005" height="36" rx="0" ry="0" fill="#f59e0b" stroke="var(--_node-stroke)" stroke-width="0.75" />
<rect x="120.77500000000002" y="338" width="217.9" height="36" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
<text x="647.84" y="296" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#fff">&quot;⚠️ 100K+ tokens!&quot;</text>
<text x="229.72500000000002" y="116" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#fff">&quot;System Prompt&lt;br/&gt;1-5K&quot;</text>
<text x="229.72500000000002" y="176" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;Tool Defs&lt;br/&gt;1-10K&quot;</text>
<text x="229.72500000000002" y="236" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;RAG Context&lt;br/&gt;10-50K&quot;</text>
<text x="229.72500000000002" y="296" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#fff">&quot;Conversation History&lt;br/&gt;GROWS every turn&quot;</text>
<text x="229.72500000000002" y="356" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;Claude Response&lt;br/&gt;1-4K&quot;</text>
</svg>