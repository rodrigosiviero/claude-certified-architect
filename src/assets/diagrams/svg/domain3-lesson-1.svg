<polyline points="1064.4,216 1184.4,216" fill="none" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#arrowhead)" />
<rect x="492.57500000000005" y="98" width="139.25" height="36" rx="0" ry="0" fill="#ef4444" stroke="var(--_node-stroke)" stroke-width="0.75" />
<rect x="1184.4" y="98" width="167.85000000000002" height="36" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
