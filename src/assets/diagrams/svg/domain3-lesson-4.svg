<rect x="40" y="40" width="117.80000000000001" height="36" rx="0" ry="0" fill="#ef4444" stroke="var(--_node-stroke)" stroke-width="0.75" />
<rect x="197.80000000000004" y="40" width="117.80000000000001" height="36" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
<rect x="355.6" y="40" width="153.55" height="36" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
<rect x="549.1500000000001" y="40" width="275.1" height="36" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
