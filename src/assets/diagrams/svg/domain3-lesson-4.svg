<text x="98.9" y="58" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#fff">Raw Document</text>
<text x="256.70000000000005" y="58" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Extract text</text>
<text x="432.375" y="58" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Clean boilerplate</text>
<text x="686.7" y="58" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Structure: headings, tables, lists</text>
