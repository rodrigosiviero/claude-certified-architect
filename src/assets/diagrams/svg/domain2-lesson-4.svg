<text x="91.75" y="151.9875" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">User Input</text>
<text x="263.85" y="151.9875" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#fff">Claude + JSON mode</text>
<text x="451.52500000000003" y="107.325" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Valid JSON?</text>
<text x="730.855" y="88.825" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="#fff">Parse and use</text>
<text x="730.855" y="182.4" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Retry with validation error</text>
</svg>