<rect x="183.5" y="133.9875" width="160.70000000000002" height="36" rx="0" ry="0" fill="#3b82f6" stroke="var(--_node-stroke)" stroke-width="0.75" />
<polygon points="451.52500000000003,40 518.85,107.325 451.52500000000003,174.65 384.20000000000005,107.325" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
<rect x="668.38" y="70.825" width="124.95" height="36" rx="0" ry="0" fill="#10b981" stroke="var(--_node-stroke)" stroke-width="0.75" />
